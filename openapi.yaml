openapi: 3.1.0
info:
  title: E-commerce API
  version: 1.0.0
servers:
  - url: https://online-store-0jq7.onrender.com
    description: Production server
  - url: http://localhost:8000
    description: Local development
paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Login
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/register:
    post:
      tags:
        - auth
      summary: Register
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
        - auth
      summary: Logout
      operationId: logout_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
        - HTTPBearer: []
  /auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh Token
      operationId: refresh_token_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Forgot Password
      operationId: forgot_password_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/auth/change-password:
    post:
      tags:
        - auth
      summary: Change Password
      operationId: change_password_auth_auth_change_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /auth/me:
    get:
      tags:
        - auth
      summary: Get Me
      operationId: get_me_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
        - HTTPBearer: []
  /users/:
    get:
      tags:
        - users
      summary: Get Users
      operationId: get_users_users__get
      security:
        - HTTPBearer: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 10
            title: Limit
        - name: role
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/UserRole'
              - type: 'null'
            title: Role
        - name: search
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Search
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationUser'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{id}:
    put:
      tags:
        - users
      summary: Update User
      operationId: update_user_users__id__put
      security:
        - HTTPBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            title: Id
        - name: name
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Name
        - name: email
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Email
        - name: avatar
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Avatar
        - name: role
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/UserRole'
              - type: 'null'
            title: Role
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - users
      summary: Delete User
      operationId: delete_user_users__id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /products/:
    get:
      tags:
        - products
      summary: List Products
      operationId: list_products_products__get
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 12
            title: Limit
        - name: category
          in: query
          required: false
          schema:
            type: string
            title: Category
        - name: search
          in: query
          required: false
          schema:
            type: string
            title: Search
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
            title: Minprice
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
            title: Maxprice
        - name: rating
          in: query
          required: false
          schema:
            type: number
            title: Rating
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            pattern: ^(name|price|rating)$
            title: Sortby
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            pattern: ^(asc|desc)$
            default: asc
            title: Sortorder
        - name: accept-language
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Accept-Language
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - products
      summary: Create Product
      operationId: create_product_products__post
      security:
        - HTTPBearer: []
      parameters:
        - name: accept-language
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Accept-Language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductIn'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /products/discounted:
    get:
      tags:
        - products
      summary: Get Discounted Products
      operationId: get_discounted_products_products_discounted_get
      parameters:
        - name: accept-language
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Accept-Language
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOut'
                title: Response Get Discounted Products Products Discounted Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /products/{product_id}:
    get:
      tags:
        - products
      summary: Get Product
      operationId: get_product_products__product_id__get
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
            title: Product Id
        - name: accept-language
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Accept-Language
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - products
      summary: Update Product
      operationId: update_product_products__product_id__put
      security:
        - HTTPBearer: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
            title: Product Id
        - name: accept-language
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Accept-Language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - products
      summary: Delete Product
      operationId: delete_product_products__product_id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
            title: Product Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /products/{product_id}/images:
    post:
      tags:
        - products
      summary: Upload Product Images
      operationId: upload_product_images_products__product_id__images_post
      security:
        - HTTPBearer: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
            title: Product Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: >-
                #/components/schemas/Body_upload_product_images_products__product_id__images_post
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Body_upload_product_images_products__product_id__images_post:
      properties:
        files:
          items:
            type: string
            contentMediaType: application/octet-stream
          type: array
          title: Files
      type: object
      required:
        - files
      title: Body_upload_product_images_products__product_id__images_post
    ChangePasswordRequest:
      properties:
        currentPassword:
          type: string
          title: Currentpassword
        newPassword:
          type: string
          title: Newpassword
      type: object
      required:
        - currentPassword
        - newPassword
      title: ChangePasswordRequest
    ForgotPasswordRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
      type: object
      required:
        - email
      title: ForgotPasswordRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
          example : "admin@admin.com"
        password:
          type: string
          title: Password
          example : "Admin123!"
      type: object
      required:
        - email
        - password
      title: LoginRequest
    Pagination:
      properties:
        page:
          type: integer
          title: Page
        limit:
          type: integer
          title: Limit
        total:
          type: integer
          title: Total
        totalPages:
          type: integer
          title: Totalpages
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      title: Pagination
    PaginationOut:
      properties:
        page:
          type: integer
          title: Page
        limit:
          type: integer
          title: Limit
        total:
          type: integer
          title: Total
        totalPages:
          type: integer
          title: Totalpages
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      title: PaginationOut
    PaginationUser:
      properties:
        users:
          items:
            $ref: '#/components/schemas/UserOut'
          type: array
          title: Users
        pagination:
          $ref: '#/components/schemas/Pagination'
      type: object
      required:
        - users
        - pagination
      title: PaginationUser
    ProductIn:
      properties:
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
        price:
          type: number
          title: Price
        stock:
          type: integer
          title: Stock
        category:
          type: string
          title: Category
        features:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Features
        discountPercentage:
          anyOf:
            - type: number
            - type: 'null'
          title: Discountpercentage
        discountExpiry:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Discountexpiry
      type: object
      required:
        - name
        - description
        - price
        - stock
        - category
      title: ProductIn
    ProductListOut:
      properties:
        products:
          items:
            $ref: '#/components/schemas/ProductOut'
          type: array
          title: Products
        categories:
          items:
            type: string
          type: array
          title: Categories
        pagination:
          $ref: '#/components/schemas/PaginationOut'
      type: object
      required:
        - products
        - categories
        - pagination
      title: ProductListOut
    ProductOut:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
        price:
          type: number
          title: Price
        category:
          type: string
          title: Category
        image:
          type: string
          title: Image
        images:
          items:
            type: string
          type: array
          title: Images
        rating:
          type: number
          title: Rating
        reviews:
          type: integer
          title: Reviews
        stock:
          type: integer
          title: Stock
        features:
          items:
            type: string
          type: array
          title: Features
        discountPercentage:
          anyOf:
            - type: number
            - type: 'null'
          title: Discountpercentage
        discountExpiry:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Discountexpiry
        createdAt:
          type: string
          format: date-time
          title: Createdat
        updatedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Updatedat
      type: object
      required:
        - id
        - name
        - description
        - price
        - category
        - image
        - images
        - rating
        - reviews
        - stock
        - features
        - createdAt
      title: ProductOut
    ProductUpdate:
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        price:
          anyOf:
            - type: number
            - type: 'null'
          title: Price
        stock:
          anyOf:
            - type: integer
            - type: 'null'
          title: Stock
        category:
          anyOf:
            - type: string
            - type: 'null'
          title: Category
        features:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Features
        discountPercentage:
          anyOf:
            - type: number
            - type: 'null'
          title: Discountpercentage
        discountExpiry:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Discountexpiry
      type: object
      required:
        - name
        - description
        - price
        - stock
        - category
        - features
        - discountPercentage
        - discountExpiry
      title: ProductUpdate
    RefreshTokenRequest:
      properties:
        refreshToken:
          type: string
          title: Refreshtoken
      type: object
      required:
        - refreshToken
      title: RefreshTokenRequest
    RegisterRequest:
      properties:
        name:
          type: string
          title: Name
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
      type: object
      required:
        - name
        - email
        - password
      title: RegisterRequest
    UserOut:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        email:
          type: string
          title: Email
        role:
          $ref: '#/components/schemas/UserRole'
        avatar:
          anyOf:
            - type: string
            - type: 'null'
          title: Avatar
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
        - id
        - name
        - email
        - role
        - created_at
      title: UserOut
    UserRole:
      type: string
      enum:
        - ADMIN
        - USER
      title: UserRole
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer